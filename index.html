<!DOCTYPE html>
<html>
<head>
  <title>Card Viewer</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f5;
    }

    img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; 
    }
  </style>
</head>
<body>
  <img src="card.png" alt="Card Image">
</body>
</html>
